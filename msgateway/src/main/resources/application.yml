# ===========================================================
# CONFIGURACION - MSGATEWAY (API Gateway)
# ===========================================================
# Este archivo centraliza el enrutamiento hacia los 10
# microservicios del sistema. El cliente solo necesita conocer
# la URL del gateway (http://localhost:8080) y una ruta logica
# (ej: /usuarios/**); el gateway se encarga de reenviar la
# peticion al servicio correspondiente.
#
# Las rutas ya NO apuntan a localhost:PUERTO fijo: usan el
# esquema lb:// (load balanced) + el nombre logico registrado
# en mseureka (spring.application.name de cada microservicio).
# Spring Cloud LoadBalancer consulta a Eureka en tiempo real
# para saber en que host/puerto esta corriendo cada uno.

spring:
  application:
    name: msgateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:

            - id: msusuarios
              uri: lb://msusuarios
              predicates:
                - Path=/usuarios/**

            - id: msproductos
              uri: lb://msproductos
              predicates:
                - Path=/productos/**

            - id: mspedidos
              uri: lb://mspedidos
              predicates:
                - Path=/pedidos/**

            - id: mspagos
              uri: lb://mspagos
              predicates:
                - Path=/pagos/**

            - id: msdelivery
              uri: lb://msdelivery
              predicates:
                - Path=/delivery/**

            - id: msrestaurantes
              uri: lb://msrestaurantes
              predicates:
                - Path=/restaurantes/**

            - id: mspromociones
              uri: lb://mspromociones
              predicates:
                - Path=/promociones/**

            - id: msrepartidores
              uri: lb://msrepartidores
              predicates:
                - Path=/repartidores/**

            - id: msnotificaciones
              uri: lb://msnotificaciones
              predicates:
                - Path=/notificaciones/**

            - id: msautenticacion
              uri: lb://msautenticacion
              predicates:
                - Path=/autenticacion/**

# Puerto unico de entrada al sistema. Todo el trafico externo
# pasa por aqui; los puertos 8081-8090 dejan de exponerse
# directamente al cliente final.
server:
  port: 8080

# ==========================
# EUREKA CLIENT
# ==========================
# El gateway también se registra en mseureka y, sobre todo,
# CONSULTA el registro para resolver las URIs lb:// de las
# rutas de arriba.
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

# Expone /actuator/health para verificar que el gateway esta arriba.
# Configuración corregida para Actuator
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always