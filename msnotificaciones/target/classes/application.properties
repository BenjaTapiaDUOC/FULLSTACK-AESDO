spring.application.name=msnotificaciones

# Puerto del microservicio
server.port=8089

# ==========================
# MYSQL (Laragon)
# ==========================
# Recuerda crear la base de datos antes de levantar el servicio:
# CREATE DATABASE msnotificaciones;

spring.datasource.url=jdbc:mysql://localhost:3306/msnotificaciones
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# JPA
# ==========================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==========================
# COMUNICACION ENTRE MICROSERVICIOS
# ==========================
# URL base del microservicio de usuarios (msusuarios).
# Se utiliza para validar que el usuarioId que llega en la
# notificacion realmente exista antes de registrarla.

msusuarios.url=http://localhost:8081/usuarios
