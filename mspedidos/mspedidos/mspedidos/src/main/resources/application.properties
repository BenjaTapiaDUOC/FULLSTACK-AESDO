spring.application.name=mspedidos

# Puerto del microservicio
server.port=8083

# ==========================
# MYSQL (Laragon)
# ==========================

spring.datasource.url=jdbc:mysql://localhost:3306/mspedidos
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# JPA
# ==========================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==========================
# COMUNICACION ENTRE MICROSERVICIOS
# ==========================
# URL base del microservicio de usuarios (msusuarios)
# Se utiliza para validar que el usuario del pedido exista.

msusuarios.url=http://localhost:8081
