spring.application.name=msdelivery

# Puerto del microservicio
server.port=8085

# ==========================
# MYSQL (Laragon)
# ==========================

spring.datasource.url=jdbc:mysql://localhost:3306/msdelivery?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# JPA
# ==========================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==========================
# COMUNICACION ENTRE MICROSERVICIOS
# ==========================
# URL base del microservicio de pedidos (mspedidos)
# Se utiliza para validar que el pedido del delivery exista.

mspedidos.url=http://localhost:8083